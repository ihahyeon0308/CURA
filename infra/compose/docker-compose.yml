services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
    depends_on:
      - redis

  analytics:
    build:
      context: ../..
      dockerfile: infra/docker/analytics.Dockerfile
    ports:
      - "8000:8000"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
